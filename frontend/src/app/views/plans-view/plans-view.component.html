<section class="page">
  <article class="panel">
    <p class="kicker">Nowy plan</p>
    <h2>{{ isEditMode ? 'Edytuj plan' : 'Dodaj plan recznie' }}</h2>
    <p class="muted" *ngIf="loadingPlan">Ladowanie planu do edycji...</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <p class="error-banner" *ngIf="submitErrorMessage">{{ submitErrorMessage }}</p>

      <div class="grid">
        <label>
          <span>Nazwa</span>
          <input formControlName="name" type="text">
          <small class="field-error" *ngIf="hasControlError('name')">{{ getControlErrorMessage('name', 'Nazwa') }}</small>
        </label>
        <label>
          <span>Data startu</span>
          <input formControlName="startDate" type="date">
          <small class="field-error" *ngIf="hasControlError('startDate')">{{ getControlErrorMessage('startDate', 'Data startu') }}</small>
        </label>
        <label>
          <span>Uwzgledniaj Strave od</span>
          <input formControlName="stravaEvaluationStartDate" type="date">
        </label>
      </div>

      <label>
        <span>Opis</span>
        <textarea formControlName="description" rows="3"></textarea>
      </label>

      <div formArrayName="trainingDays" class="day-list">
        <div class="day-card" *ngFor="let day of trainingDays.controls; let i = index" [formGroupName]="i">
          <div class="day-card-header">
            <p class="day-card-title">Dzien treningowy {{ i + 1 }}</p>

            <div class="day-card-actions">
              <button type="button" class="secondary icon-button" (click)="moveTrainingDay(i, -1)" [disabled]="i === 0" aria-label="Przenies wyzej">
                ↑
              </button>
              <button type="button" class="secondary icon-button" (click)="moveTrainingDay(i, 1)" [disabled]="i === trainingDays.length - 1" aria-label="Przenies nizej">
                ↓
              </button>
              <button type="button" class="danger-button" (click)="removeTrainingDay(i)">Usun dzien</button>
            </div>
          </div>

          <div class="grid">
            <label>
              <span>Dzien</span>
              <input formControlName="scheduledDate" type="date">
              <small class="field-error" *ngIf="hasControlError('trainingDays.' + i + '.scheduledDate')">{{ getControlErrorMessage('trainingDays.' + i + '.scheduledDate', 'Dzien') }}</small>
            </label>
            <label>
              <span>Tytul</span>
              <input formControlName="title" type="text">
              <small class="field-error" *ngIf="hasControlError('trainingDays.' + i + '.title')">{{ getControlErrorMessage('trainingDays.' + i + '.title', 'Tytul') }}</small>
            </label>
            <label>
              <span>Typ</span>
              <select formControlName="activityType">
                <option value="RUN">Bieg</option>
                <option value="RIDE">Rower</option>
                <option value="SWIM">Plywanie</option>
                <option value="WALK">Marsz</option>
                <option value="WORKOUT">Trening</option>
                <option value="STRENGTH">Sila</option>
                <option value="OTHER">Inne</option>
              </select>
              <small class="field-error" *ngIf="hasControlError('trainingDays.' + i + '.activityType')">{{ getControlErrorMessage('trainingDays.' + i + '.activityType', 'Typ') }}</small>
            </label>
            <label>
              <span>Dystans planowany (m)</span>
              <input formControlName="plannedDistanceMeters" type="number" min="0" step="100">
            </label>
            <label>
              <span>Czas planowany (s)</span>
              <input formControlName="plannedDurationSeconds" type="number" min="0" step="60">
            </label>
          </div>

          <label>
            <span>Notatki</span>
            <textarea formControlName="notes" rows="3"></textarea>
          </label>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="secondary" (click)="addTrainingDay()">Dodaj dzien</button>
        <button type="button" class="secondary" *ngIf="isEditMode" (click)="router.navigate(['/plans/list'])">Anuluj</button>
        <button type="submit">{{ isEditMode ? 'Zapisz zmiany' : 'Zapisz plan' }}</button>
      </div>
    </form>
  </article>

  <article class="panel" *ngIf="!isEditMode">
    <p class="kicker">Import JSON</p>
    <h2>Wklej plan lub wczytaj plik JSON</h2>
    <label class="file-picker">
      <span>Plik JSON</span>
      <input type="file" accept=".json,application/json" (change)="onJsonFileSelected($event)">
    </label>
    <p class="muted" *ngIf="importedFileName">Wczytano plik: {{ importedFileName }}</p>
    <textarea
      [(ngModel)]="jsonInput"
      (ngModelChange)="onJsonInputChange($event)"
      [ngModelOptions]="{ standalone: true }"
      rows="12"
      class="json-box"></textarea>
    <p class="error-message" *ngIf="jsonErrorMessage">{{ jsonErrorMessage }}</p>
    <div class="actions">
      <button type="button" (click)="importJson()">Importuj</button>
    </div>
  </article>
</section>
