spring:
  application:
    name: travans-backend
  profiles:
    default: dev,local
  datasource:
    url: ${TRAVANS_DB_URL:jdbc:postgresql://localhost:5432/travans}
    username: ${TRAVANS_DB_USERNAME:travans}
    password: ${TRAVANS_DB_PASSWORD:travans}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080

travans:
  cors:
    allowed-origins:
      - http://localhost:4200
  auth:
    jwt-secret: ${TRAVANS_JWT_SECRET:travans-super-secret-key-change-me-1234567890}
    access-token-ttl-minutes: ${TRAVANS_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${TRAVANS_REFRESH_TOKEN_TTL_DAYS:30}
  strava:
    base-url: https://www.strava.com/api/v3
    oauth-url: https://www.strava.com/oauth/authorize
    token-url: https://www.strava.com/oauth/token
