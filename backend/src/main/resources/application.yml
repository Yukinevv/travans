spring:
  application:
    name: travans-backend
  datasource:
    url: ${TRAVANS_DB_URL:jdbc:postgresql://localhost:5432/travans}
    username: ${TRAVANS_DB_USERNAME:travans}
    password: ${TRAVANS_DB_PASSWORD:travans}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080

travans:
  cors:
    allowed-origins:
      - http://localhost:4200
  strava:
    base-url: https://www.strava.com/api/v3
    oauth-url: https://www.strava.com/oauth/authorize
    token-url: https://www.strava.com/oauth/token
    client-id: ${TRAVANS_STRAVA_CLIENT_ID:}
    client-secret: ${TRAVANS_STRAVA_CLIENT_SECRET:}
    redirect-uri: ${TRAVANS_STRAVA_REDIRECT_URI:http://localhost:4200/integrations}
    webhook-verify-token: ${TRAVANS_STRAVA_WEBHOOK_VERIFY_TOKEN:travans-dev-token}
